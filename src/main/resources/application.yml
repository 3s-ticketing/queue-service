spring:
  application:
    name: queue-service

  cache:
    type: redis

  cloud:
    discovery:
      enabled: false
    config:
      import-check:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                    # 모든 replica 확인 후 응답 (데이터 유실 방지)
      retries: 3
      properties:
        enable.idempotence: true   # 중복 전송 방지
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: queue-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 10
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        session.timeout.ms: 15000
        heartbeat.interval.ms: 5000
        retry.backoff.ms: 2000
        isolation.level: read_committed
    listener:
      ack-mode: manual
      concurrency: 3
      missing-topics-fatal: false
      observation-enabled: true

eureka:
  client:
    enabled: false

queue:
  token:
    secret: ${QUEUE_TOKEN_SECRET:aUpW71xa0Tn+otrFrnAbF3c+G4MH4QDXjZvTjvE+3D8=}

  # Outbox 스케줄러 (실패 메시지 재시도)
  outbox:
    scheduler:
      fixed-delay: 60000           # 60초마다 PENDING/FAILED 재시도