spring:
  config:
    activate:
      on-profile: docker

  data:
    redis:
      host: ticketing-redis
      port: 6379
      timeout: 5000ms
      lettuce:
        shutdown-timeout: 100ms

  datasource:
    url: jdbc:postgresql://${DB_HOST:ticketing-postgres}:${DB_PORT:15432}/${DB_NAME:ticketing}?currentSchema=${QUEUE_SCHEMA:queue}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 20
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}   # 도커는 update (create면 매번 초기화 위험)
    properties:
      hibernate:
        default_schema: ${QUEUE_SCHEMA:queue}
        hbm2ddl:
          create_schemas: true

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:10001/eureka/}  # 도커 내부 서비스명

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

