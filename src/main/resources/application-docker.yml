server:
  tomcat:
    threads:
      max: 1000
      min-spare: 100
    accept-count: 1000
    max-connections: 10000

  port: ${SERVER_PORT:20007}

spring:
  config:
    activate:
      on-profile: docker

  data:
    redis:
      host: ${REDIS_HOST:ticketing-redis}
      port: ${REDIS_PORT:6379}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 20
          max-wait: 3000ms

  datasource:
    url: jdbc:postgresql://${DB_HOST:ticketing-postgres}:${DB_PORT:15432}/${DB_NAME:ticketing}?currentSchema=${DB_SCHEMA:queue_service}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:queue}
        hbm2ddl:
          create_schemas: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://eureka-server:10001/eureka/}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 0.1
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

queue:
  token:
    secret: ${QUEUE_TOKEN_SECRET}
