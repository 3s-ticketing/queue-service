spring:
  application:
    name: queue-service

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      timeout: 2000

  cloud:
    discovery:
      enabled: false
    config:
      import-check:
        enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:queue_db}
    username: ${DB_USERNAME:queue_user}
    password: ${DB_PASSWORD:queue_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    enabled: false