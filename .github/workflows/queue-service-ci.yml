name: Queue Service CI

on:
  pull_request:
    paths:
      - 'queue-service/**'
      - '.github/workflows/queue-service-ci.yml'
    branches:
      - dev
      - main

  push:
    branches:
      - dev
      - main
      - feature/**
      - feat/**
      - fix/**
      - chore/**

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./queue-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew clean test