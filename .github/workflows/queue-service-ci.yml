name: Queue Service CI

on:
  pull_request:
    branches:
      - dev
      - main

  push:
    branches:
      - dev
      - main
      - feature/**
      - feat/**
      - fix/**
      - chore/**

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUEUE_TOKEN_SECRET: ${{ secrets.QUEUE_TOKEN_SECRET }}
        run: ./gradlew clean test

      - name: Print failed test logs
        if: failure()
        run: |
          find . -path "*/TEST-*.xml" | xargs grep -l "failures=\"[1-9]\|errors=\"[1-9]\"" | while read f; do
            echo "===== $f ====="
            cat "$f"
          done

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            build/reports/tests/test/
            build/reports/problems/
          retention-days: 3